{{- if .Values.config.skills }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "andino.name" . }}-skills
  namespace: {{ include "andino.namespace" . }}
  labels:
    {{- include "andino.labels" . | nindent 4 }}
data:
  {{- range $name, $content := .Values.config.skills }}
  {{ $name }}.md: |
    {{- $content | nindent 4 }}
  {{- end }}
{{- end }}
