apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "andino.name" . }}-config
  namespace: {{ include "andino.namespace" . }}
  labels:
    {{- include "andino.labels" . | nindent 4 }}
data:
  agent.yaml: |
    {{- .Values.config.agentYaml | nindent 4 }}
  {{- if .Values.config.systemPrompt }}
  system_prompt.md: |
    {{- .Values.config.systemPrompt | nindent 4 }}
  {{- end }}
