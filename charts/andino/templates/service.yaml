apiVersion: v1
kind: Service
metadata:
  name: {{ include "andino.name" . }}
  namespace: {{ include "andino.namespace" . }}
  labels:
    {{- include "andino.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "andino.selectorLabels" . | nindent 4 }}
